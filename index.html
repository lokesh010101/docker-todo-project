<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docker Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    .container { width: 100%; max-width: 520px; }
    h1 { font-size: 2rem; margin-bottom: 6px; color: #38bdf8; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 28px; }
    form { display: flex; gap: 10px; margin-bottom: 24px; }
    input[type="text"] {
      flex: 1; padding: 12px 16px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; color: #e2e8f0; font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }
    button.add-btn {
      padding: 12px 20px; background: #38bdf8; color: #0f172a;
      border: none; border-radius: 10px; font-weight: 700;
      cursor: pointer; font-size: 1rem;
    }
    button.add-btn:hover { background: #7dd3fc; }
    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .todo-item {
      display: flex; align-items: center; gap: 12px;
      background: #1e293b; padding: 14px 16px;
      border-radius: 12px; border: 1px solid #334155;
    }
    .todo-item.done .task-text { text-decoration: line-through; color: #475569; }
    .task-text { flex: 1; font-size: 0.98rem; }
    a.action-btn {
      padding: 6px 12px; border-radius: 7px;
      text-decoration: none; font-size: 0.82rem; font-weight: 600;
    }
    a.toggle-btn { background: #1d4ed8; color: #bfdbfe; }
    a.toggle-btn:hover { background: #2563eb; }
    a.delete-btn { background: #7f1d1d; color: #fca5a5; }
    a.delete-btn:hover { background: #dc2626; }
    .empty { text-align: center; color: #475569; margin-top: 40px; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>
    <p class="subtitle">Powered by Flask + Docker</p>
    <form action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." required />
      <button type="submit" class="add-btn">Add</button>
    </form>
    {% if todos %}
    <ul class="todo-list">
      {% for todo in todos %}
      <li class="todo-item {% if todo.done %}done{% endif %}">
        <span class="task-text">{{ todo.task }}</span>
        <a href="/toggle/{{ todo.id }}" class="action-btn toggle-btn">
          {% if todo.done %}Undo{% else %}Done{% endif %}
        </a>
        <a href="/delete/{{ todo.id }}" class="action-btn delete-btn">Delete</a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No tasks yet. Add one above! 🚀</p>
    {% endif %}
  </div>
</body>
</html>
